name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Cache Cargo registry and build
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry/index
          ~/.cargo/registry/cache
          ~/.cargo/git/db
          target
        key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          cargo-${{ runner.os }}-

    - name: Cache CBMC deb
      id: cache-cbmc
      uses: actions/cache@v4
      with:
        path: ~/cbmc-cache
        key: cbmc-6.3.1

    - name: Download CBMC
      if: steps.cache-cbmc.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/cbmc-cache
        wget -q -O ~/cbmc-cache/cbmc.deb https://github.com/diffblue/cbmc/releases/download/cbmc-6.3.1/ubuntu-22.04-cbmc-6.3.1-Linux.deb

    - name: Install CBMC
      run: sudo dpkg -i ~/cbmc-cache/cbmc.deb && goto-cc --version

    - name: Cache ESBMC zip
      id: cache-esbmc
      uses: actions/cache@v4
      with:
        path: ~/esbmc-cache
        key: esbmc-v8.0

    - name: Download ESBMC
      if: steps.cache-esbmc.outputs.cache-hit != 'true'
      run: |
        mkdir -p ~/esbmc-cache
        wget -q -O ~/esbmc-cache/esbmc-linux.zip https://github.com/esbmc/esbmc/releases/download/v8.0/esbmc-linux.zip

    - name: Install ESBMC
      run: unzip -o ~/esbmc-cache/esbmc-linux.zip && chmod +x ./bin/esbmc && ./bin/esbmc --version

    - name: Build
      run: cargo build --verbose

    - name: Test
      run: GOTO_CC=goto-cc ESBMC=$PWD/bin/esbmc cargo test
